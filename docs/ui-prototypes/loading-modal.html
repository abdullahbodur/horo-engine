<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horo Engine - Loading Project</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Horo Engine Color Palette (Modern Dark Theme) */
            --bg-canvas: #0f1115;
            --bg-modal: #1a1d24;
            --bg-modal-border: rgba(255, 255, 255, 0.08);
            
            --text-primary: #f0f0f0;
            --text-secondary: #9aa0a6;
            --text-accent: #3b82f6;
            
            --progress-bg: #2a2d35;
            --progress-fill: linear-gradient(90deg, #3b82f6, #60a5fa);
            --progress-glow: rgba(59, 130, 246, 0.4);
            
            --btn-bg: #2a2d35;
            --btn-hover: #3b82f6;
            --btn-border: rgba(255, 255, 255, 0.1);
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-canvas);
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            /* subtle background pattern to simulate IDE canvas */
            background-image: radial-gradient(circle at 50% 50%, #171a21 0%, #0f1115 100%);
        }

        /* Modal Container */
        .loading-modal {
            background-color: var(--bg-modal);
            width: 480px;
            border-radius: 12px;
            box-shadow: 0 24px 48px rgba(0, 0, 0, 0.4), 
                        0 0 0 1px var(--bg-modal-border) inset;
            padding: 32px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            
            /* Entrance Animation */
            opacity: 0;
            transform: translateY(10px) scale(0.98);
            animation: modalEnter 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes modalEnter {
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* Header */
        .modal-header {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .project-title {
            color: var(--text-primary);
            font-size: 18px;
            font-weight: 600;
            margin: 0;
            letter-spacing: -0.01em;
        }

        .status-text {
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 400;
            margin: 0;
            display: flex;
            justify-content: space-between;
        }
        
        .status-percentage {
            color: var(--text-accent);
            font-variant-numeric: tabular-nums;
            font-weight: 500;
        }

        /* Progress Bar */
        .progress-container {
            width: 100%;
            height: 6px;
            background-color: var(--progress-bg);
            border-radius: 4px;
            overflow: hidden;
            position: relative;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: var(--progress-fill);
            border-radius: 4px;
            transition: width 0.1s linear;
            box-shadow: 0 0 8px var(--progress-glow);
            position: relative;
        }
        
        /* Shimmer effect on progress bar */
        .progress-bar::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(
                90deg,
                rgba(255,255,255,0) 0%,
                rgba(255,255,255,0.2) 50%,
                rgba(255,255,255,0) 100%
            );
            animation: shimmer 1.5s infinite linear;
            transform: translateX(-100%);
        }

        @keyframes shimmer {
            100% {
                transform: translateX(100%);
            }
        }

        /* Footer & Actions */
        .modal-footer {
            display: flex;
            justify-content: flex-end;
            margin-top: 8px;
        }

        .btn-cancel {
            background-color: transparent;
            color: var(--text-primary);
            border: 1px solid var(--btn-border);
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-cancel:hover {
            background-color: var(--btn-hover);
            border-color: var(--btn-hover);
            color: #ffffff;
        }
        
        .btn-cancel:active {
            transform: scale(0.96);
        }

    </style>
</head>
<body>

    <div class="loading-modal">
        <div class="modal-header">
            <h2 class="project-title">Opening 'SecondGame'</h2>
            <div class="status-text">
                <span id="statusLabel">Initializing asset database...</span>
                <span id="percentageLabel" class="status-percentage">0%</span>
            </div>
        </div>

        <div class="progress-container">
            <div class="progress-bar" id="progressBar"></div>
        </div>

        <div class="modal-footer">
            <button class="btn-cancel" onclick="cancelLoading()">Cancel</button>
        </div>
    </div>

    <script>
        // Simulation Logic for Prototype Visualization
        const progressBar = document.getElementById('progressBar');
        const statusLabel = document.getElementById('statusLabel');
        const percentageLabel = document.getElementById('percentageLabel');
        
        const loadingSteps = [
            { threshold: 0, text: "Initializing asset database..." },
            { threshold: 15, text: "Parsing project manifests..." },
            { threshold: 30, text: "Resolving dependencies..." },
            { threshold: 55, text: "Compiling shaders..." },
            { threshold: 85, text: "Loading default scene..." },
            { threshold: 98, text: "Finalizing workspace..." }
        ];

        let progress = 0;
        let isCancelled = false;

        function updateSimulation() {
            if (isCancelled) return;
            
            progress += Math.random() * 2.5;
            
            if (progress >= 100) {
                progress = 100;
                progressBar.style.width = '100%';
                percentageLabel.textContent = '100%';
                statusLabel.textContent = "Ready!";
                
                setTimeout(() => {
                    if(!isCancelled) {
                        alert("Transitioning to Editor Workspace...");
                        progress = 0;
                        updateSimulation();
                    }
                }, 600);
                return;
            }

            progressBar.style.width = `${progress}%`;
            percentageLabel.textContent = `${Math.floor(progress)}%`;

            const currentStep = loadingSteps.slice().reverse().find(step => progress >= step.threshold);
            if (currentStep) {
                statusLabel.textContent = currentStep.text;
            }

            const nextTick = Math.random() * 80 + 20; 
            setTimeout(updateSimulation, nextTick);
        }

        function cancelLoading() {
            isCancelled = true;
            statusLabel.textContent = "Cancelling...";
            statusLabel.style.color = "#ef4444";
            progressBar.style.background = "#ef4444";
            progressBar.style.boxShadow = "0 0 8px rgba(239, 68, 68, 0.4)";
            
            setTimeout(() => {
                alert("Returned to Welcome Screen.");
                isCancelled = false;
                progress = 0;
                statusLabel.style.color = "";
                progressBar.style.background = "";
                progressBar.style.boxShadow = "";
                updateSimulation();
            }, 800);
        }

        setTimeout(updateSimulation, 500);

    </script>
</body>
</html>
