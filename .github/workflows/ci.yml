name: CI

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

# Cancel in-progress runs for the same branch when a new push arrives
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  #   ----------------------------------------------------------------
  #   Build + Test — macOS (Clang, Ninja)
  #   ----------------------------------------------------------------
  test-macos:
    name: Test · macOS / Clang
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Ninja
        run: brew install ninja

      - name: Cache FetchContent dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cmake/fetchcontent
          key: fetchcontent-macos-${{ hashFiles('**/CMakeLists.txt', '**/CMakePresets.json') }}
          restore-keys: fetchcontent-macos-

      - name: Configure
        run: cmake --preset debug
        env:
          FETCHCONTENT_BASE_DIR: ${{ github.workspace }}/.cmake/fetchcontent

      - name: Build
        run: cmake --build --preset debug --parallel

      - name: Test
        run: ctest --preset debug --output-on-failure

  test-windows:
    name: Test · Windows / MSVC
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Cache FetchContent dependencies
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.cmake/fetchcontent
          key: fetchcontent-windows-${{ hashFiles('**/CMakeLists.txt', '**/CMakePresets.json') }}
          restore-keys: fetchcontent-windows-

      - name: Configure
        run: cmake --preset debug-msvc
        env:
          FETCHCONTENT_BASE_DIR: ${{ github.workspace }}/.cmake/fetchcontent

      - name: Setup tmate session
        if: failure() && github.event_name == 'workflow_dispatch'
        uses: mxschmitt/action-tmate@v3

      - name: Build
        run: cmake --build build/debug-msvc --config Debug --parallel

      - name: Test
        run: ctest --test-dir build/debug-msvc -C Debug --output-on-failure

  test-linux:
    name: Test · Linux / GCC
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          if ! sudo apt-get update; then
            sudo rm -f /etc/apt/sources.list.d/azure-cli.list /etc/apt/sources.list.d/microsoft-prod.list
            sudo apt-get update
          fi
          sudo apt-get install -y --no-install-recommends \
            ninja-build \
            xvfb \
            ffmpeg \
            libwayland-dev \
            wayland-protocols \
            libxkbcommon-dev \
            libx11-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxi-dev \
            libxext-dev \
            libgl1-mesa-dev \
            libglu1-mesa-dev

      - name: Cache FetchContent dependencies
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.cmake/fetchcontent
          key: fetchcontent-linux-${{ hashFiles('**/CMakeLists.txt', '**/CMakePresets.json') }}
          restore-keys: fetchcontent-linux-

      - name: Configure
        run: cmake --preset debug
        env:
          FETCHCONTENT_BASE_DIR: ${{ github.workspace }}/.cmake/fetchcontent

      - name: Build
        run: cmake --build --preset debug --parallel

      - name: Test
        run: ctest --preset debug --output-on-failure

      - name: Prepare UI test output directory
        run: mkdir -p ui_test_output

      - name: Build UI Automation Target
        run: cmake --build --preset debug --target HoroEditorUiTest --parallel

      - name: Run UI Automation
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" \
            build/debug/bin/HoroEditorUiTest --run-ui-tests
        env:
          MONOLITH_UI_TEST_CAPTURE: "1"
          MONOLITH_UI_TEST_VIDEO: "1"
          MONOLITH_UI_TEST_RECORDING: "1"
          MONOLITH_UI_TEST_FILTER: "launcher/*"
          MONOLITH_UI_TEST_DELAY_MS: "0"
          MONOLITH_UI_TEST_OUTPUT_DIR: ${{ github.workspace }}/ui_test_output
          MONOLITH_UI_TEST_FFMPEG_PATH: "/usr/bin/ffmpeg"
          LIBGL_ALWAYS_SOFTWARE: "1"
          GALLIUM_DRIVER: "llvmpipe"
          MONOLITH_GLFW_SAMPLES: "0"

      - name: Setup tmate session on failure
        if: failure() && github.event_name == 'workflow_dispatch'
        uses: mxschmitt/action-tmate@v3

      - name: Upload UI Test Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-test-results-linux
          path: ui_test_output/
          if-no-files-found: ignore
          retention-days: 30

  # ----------------------------------------------------------------
  # Coverage — Linux (GCC --coverage + lcov + genhtml)
  # Runs after required test jobs pass; uploads HTML report as artifact
  # ----------------------------------------------------------------
  coverage:
    name: Coverage · Linux / GCC
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    needs: [ test-linux, test-windows, test-macos ]

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          if ! sudo apt-get update -qq; then
            # Ubuntu hosted runners occasionally include broken Microsoft apt mirrors.
            # Remove them and retry so CI remains deterministic.
            sudo rm -f /etc/apt/sources.list.d/azure-cli.list /etc/apt/sources.list.d/microsoft-prod.list
            sudo apt-get update -qq
          fi
          sudo apt-get install -y --no-install-recommends \
            ninja-build lcov \
            libwayland-dev wayland-protocols libxkbcommon-dev \
            libx11-dev libxrandr-dev libxinerama-dev \
            libxcursor-dev libxi-dev libxext-dev \
            libgl1-mesa-dev libglu1-mesa-dev

      - name: Cache FetchContent dependencies
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.cmake/fetchcontent
          key: fetchcontent-linux-${{ hashFiles('**/CMakeLists.txt', '**/CMakePresets.json') }}
          restore-keys: fetchcontent-linux-

      - name: Configure (coverage instrumentation)
        run: cmake --preset coverage
        env:
          FETCHCONTENT_BASE_DIR: ${{ github.workspace }}/.cmake/fetchcontent

      - name: Build
        run: cmake --build build/coverage --parallel

      - name: Run tests
        run: ctest --test-dir build/coverage --output-on-failure

      - name: Collect coverage data
        run: |
          geninfo build/coverage \
            --output-filename build/coverage/raw.info \
            --ignore-errors mismatch,source \
            --branch-coverage

      - name: Filter out third-party and test code
        run: |
          lcov \
            --remove build/coverage/raw.info \
              '*/vendor/*' \
              '*/_deps/*' \
              '*/tests/*' \
              '/usr/*' \
              '*/catch2/*' \
              'catch2/*' \
              '*/Catch2/*' \
            --output-file build/coverage/filtered.info \
            --ignore-errors mismatch,unused \
            --branch-coverage

      - name: Generate HTML report
        run: |
          genhtml build/coverage/filtered.info \
            --output-directory build/coverage/html \
            --branch-coverage \
            --ignore-errors mismatch,source \
            --synthesize-missing \
            --title "MonolithEngine — ${{ github.ref_name }} @ ${{ github.sha }}"

      - name: Print summary
        run: |
          echo "### Coverage Summary" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          lcov --summary build/coverage/filtered.info >> $GITHUB_STEP_SUMMARY 2>&1
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Print per-file coverage table
        run: |
          echo "### Per-File Coverage" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          lcov --list build/coverage/filtered.info 2>&1 >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Upload HTML coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-${{ github.sha }}
          path: build/coverage/html
          retention-days: 30

  # ----------------------------------------------------------------
  # Starter integration — final PR gate.
  # Validates this PR commit inside horo-engine-starter on all OS targets.
  # ----------------------------------------------------------------
  starter-integration:
    name: Starter Integration
    if: github.event_name == 'pull_request'
    needs: [ coverage ]
    uses: abdullahbodur/horo-engine-starter/.github/workflows/engine-test.yml@main
    with:
      engine_repository: ${{ github.repository }}
      engine_ref: ${{ github.event.pull_request.head.sha }}
    secrets: inherit
