name: CI

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/ISSUE_TEMPLATE/**'
  pull_request:
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/ISSUE_TEMPLATE/**'
  workflow_dispatch:

permissions:
  contents: read
  checks: write        # required by mikepenz/action-junit-report to post test result annotations
  pull-requests: write # required to post coverage summaries as PR comments

# Cancel in-progress runs for the same ref when a new push arrives.
# PRs and branches each get their own concurrency group so they don't
# cancel each other.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ----------------------------------------------------------------
  # Lint — clang-format check (fast, runs in parallel with build jobs)
  # ----------------------------------------------------------------
  lint:
    name: Lint · clang-format
    runs-on: ubuntu-24.04
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Install clang-format
        run: sudo apt-get install -y --no-install-recommends clang-format

      - name: Check formatting
        run: |
          git ls-files '*.cpp' '*.h' | grep -v '^vendor/' | \
            xargs clang-format --dry-run --Werror

  #   ----------------------------------------------------------------
  #   Build + Test — macOS (Clang, Ninja)
  #   ----------------------------------------------------------------
  test-macos:
    name: Test · macOS / Clang
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Restore compiler cache
        uses: hendrikmuhs/ccache-action@v1.2.22
        with:
          key: ${{ github.job }}-${{ runner.os }}

      - name: Install ffmpeg
        run: brew install ffmpeg

      - name: Cache FetchContent dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cmake/fetchcontent
          key: fetchcontent-macos-${{ hashFiles('**/CMakeLists.txt', '**/CMakePresets.json') }}
          restore-keys: fetchcontent-macos-

      - name: Configure
        run: >
          cmake --preset debug
          -DCMAKE_C_COMPILER_LAUNCHER=ccache
          -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
        env:
          FETCHCONTENT_BASE_DIR: ${{ github.workspace }}/.cmake/fetchcontent

      - name: Build
        run: cmake --build --preset debug --parallel

      - name: Test
        run: |
          mkdir -p "${{ github.workspace }}/build/debug/test-results"
          ctest --preset debug --output-on-failure \
            --output-junit "${{ github.workspace }}/build/debug/test-results/results.xml"
        env:
          MONOLITH_LOG_LEVEL: "debug"

      - name: Publish test results
        if: always()
        uses: mikepenz/action-junit-report@v4
        with:
          report_paths: build/debug/test-results/results.xml
          check_name: "Test Results · macOS"
          fail_on_failure: true
          require_tests: true
          detailed_summary: true
          include_passed: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-macos
          path: build/debug/test-results/
          retention-days: 14

      - name: Prepare UI test output directory
        run: mkdir -p ui_test_output

      - name: Build UI Automation Target
        run: cmake --build --preset debug --target HoroEditorUiTest --parallel

      - name: Resolve ffmpeg path
        shell: bash
        run: echo "FFMPEG_PATH=$(which ffmpeg)" >> $GITHUB_ENV

      - name: Run UI Automation
        shell: bash
        run: |
          build/debug/bin/HoroEditorUiTest --run-ui-tests
        env:
          MONOLITH_UI_TEST_CAPTURE: "1"
          MONOLITH_UI_TEST_VIDEO: "1"
          MONOLITH_UI_TEST_RECORDING: "1"
          MONOLITH_UI_TEST_FILTER: "launcher/*"
          MONOLITH_UI_TEST_DELAY_MS: "0"
          MONOLITH_UI_TEST_OUTPUT_DIR: ${{ github.workspace }}/ui_test_output
          MONOLITH_UI_TEST_FFMPEG_PATH: ${{ env.FFMPEG_PATH }}
          MONOLITH_LOG_LEVEL: "debug"
          MONOLITH_GLFW_SAMPLES: "0"

      - name: Setup tmate session
        if: failure() && github.event_name == 'workflow_dispatch'
        uses: mxschmitt/action-tmate@v3

      - name: Upload UI Test Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-test-results-macos
          path: ui_test_output/
          if-no-files-found: ignore
          retention-days: 30

  test-windows:
    name: Test · Windows / MSVC
    runs-on: windows-latest
    timeout-minutes: 45
    env:
      SCCACHE_DIR: ${{ github.workspace }}/.sccache

    steps:
      - uses: actions/checkout@v4

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.7

      - name: Cache sccache
        uses: actions/cache@v4
        with:
          path: ${{ env.SCCACHE_DIR }}
          key: sccache-windows-${{ hashFiles('**/CMakeLists.txt', '**/CMakePresets.json') }}
          restore-keys: sccache-windows-

      - name: Cache FetchContent dependencies
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.cmake/fetchcontent
          key: fetchcontent-windows-${{ hashFiles('**/CMakeLists.txt', '**/CMakePresets.json') }}
          restore-keys: fetchcontent-windows-

      - name: Configure
        run: >
          cmake --preset debug-msvc
          -DCMAKE_C_COMPILER_LAUNCHER=sccache
          -DCMAKE_CXX_COMPILER_LAUNCHER=sccache
          -DCMAKE_EXE_LINKER_FLAGS_DEBUG=/DEBUG:FASTLINK
          -DCMAKE_SHARED_LINKER_FLAGS_DEBUG=/DEBUG:FASTLINK
          -DCMAKE_MODULE_LINKER_FLAGS_DEBUG=/DEBUG:FASTLINK
        env:
          FETCHCONTENT_BASE_DIR: ${{ github.workspace }}/.cmake/fetchcontent

      - name: Build
        run: cmake --build build/debug-msvc --config Debug --parallel

      - name: Test
        run: |
          New-Item -ItemType Directory -Force -Path "${{ github.workspace }}/build/debug-msvc/test-results" | Out-Null
          ctest --test-dir build/debug-msvc -C Debug --output-on-failure --parallel `
            --output-junit "${{ github.workspace }}/build/debug-msvc/test-results/results.xml"
        shell: pwsh
        env:
          MONOLITH_LOG_LEVEL: "debug"

      - name: Publish test results
        if: always()
        uses: mikepenz/action-junit-report@v4
        with:
          report_paths: build/debug-msvc/test-results/results.xml
          check_name: "Test Results · Windows"
          fail_on_failure: true
          require_tests: true
          detailed_summary: true
          include_passed: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-windows
          path: build/debug-msvc/test-results/
          retention-days: 14

      - name: Install ffmpeg
        run: choco install ffmpeg -y --no-progress
        shell: pwsh

      - name: Prepare UI test output directory
        run: New-Item -ItemType Directory -Force -Path ui_test_output
        shell: pwsh

      - name: Build UI Automation Target
        run: cmake --build build/debug-msvc --config Debug --target HoroEditorUiTest --parallel

      - name: Resolve ffmpeg path
        run: |
          $ffmpeg = (Get-Command ffmpeg).Source
          echo "FFMPEG_PATH=$ffmpeg" >> $env:GITHUB_ENV
        shell: pwsh

      - name: Install Mesa3D (software OpenGL for headless CI)
        shell: pwsh
        run: |
          # mesa-dist-win 25.x: opengl32.dll stub → libgallium_wgl.dll (D3D12 backend).
          # D3D12 WARP (Windows Advanced Rasterization Platform) is Microsoft's
          # built-in pure-software D3D12 renderer — no GPU or driver required.
          # DO NOT set GALLIUM_DRIVER=softpipe here; mesa 25.x WGL only has D3D12.
          $ver = "25.3.6"
          $url = "https://github.com/pal1000/mesa-dist-win/releases/download/$ver/mesa3d-$ver-release-msvc.7z"
          Invoke-WebRequest -Uri $url -OutFile mesa3d.7z -UseBasicParsing
          7z x mesa3d.7z -omesa3d -y | Out-Null
          $dest = "build\debug-msvc\bin\Debug"
          # Copy all x64 DLLs so transitive dependencies of libgallium_wgl.dll
          # (e.g. spirv_to_dxil.dll for shader compilation) are available.
          Copy-Item "mesa3d\x64\*.dll" $dest -Force
          Write-Host "=== Mesa WGL DLLs installed (opengl32 + libgallium_wgl) ==="
          Get-ChildItem "$dest\opengl32.dll", "$dest\libgallium_wgl.dll" |
            Select-Object Name, Length | Format-Table

      - name: Run UI Automation
        shell: pwsh
        timeout-minutes: 10
        run: |
          # Redirect stdout/stderr to files so output survives a timeout kill.
          # (PowerShell loses buffered child stdout when it kills by timeout.)
          $out = "ui_test_output\stdout.txt"
          $err = "ui_test_output\stderr.txt"
          $proc = Start-Process `
              -FilePath ".\build\debug-msvc\bin\Debug\HoroEditorUiTest.exe" `
              -ArgumentList "--run-ui-tests" `
              -NoNewWindow -PassThru `
              -RedirectStandardOutput $out `
              -RedirectStandardError  $err
          Write-Host "HoroEditorUiTest PID=$($proc.Id) — waiting up to 8 min..."
          $exited = $proc.WaitForExit(480000)
          if (-not $exited) {
              Write-Warning "Process did not exit — killing"
              $proc.Kill()
              Start-Sleep -Seconds 2
          }
          if (Test-Path $out) { Write-Host "=== stdout ==="; Get-Content $out }
          if (Test-Path $err) { Write-Host "=== stderr ==="; Get-Content $err }
          $code = if ($proc.HasExited) { $proc.ExitCode } else { -1 }
          if ($code -ne 0) { Write-Error "HoroEditorUiTest exited $code"; exit 1 }
        env:
          MONOLITH_UI_TEST_CAPTURE: "1"
          MONOLITH_UI_TEST_VIDEO: "1"
          MONOLITH_UI_TEST_RECORDING: "1"
          MONOLITH_UI_TEST_FILTER: "launcher/*"
          MONOLITH_UI_TEST_DELAY_MS: "0"
          MONOLITH_UI_TEST_OUTPUT_DIR: ${{ github.workspace }}\ui_test_output
          MONOLITH_UI_TEST_FFMPEG_PATH: ${{ env.FFMPEG_PATH }}
          MONOLITH_LOG_LEVEL: "debug"
          MONOLITH_GLFW_SAMPLES: "0"
          # No GALLIUM_DRIVER — mesa 25.x WGL uses D3D12/WARP by default
          LIBGL_DEBUG: "verbose"
          MESA_DEBUG: "1"

      - name: Setup tmate session
        if: failure() && github.event_name == 'workflow_dispatch'
        uses: mxschmitt/action-tmate@v3

      - name: Upload UI Test Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-test-results-windows
          path: ui_test_output\
          if-no-files-found: ignore
          retention-days: 30

      - name: Show sccache stats
        if: always()
        run: sccache --show-stats

  test-linux:
    name: Test · Linux / GCC
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Restore compiler cache
        uses: hendrikmuhs/ccache-action@v1.2.22
        with:
          key: ${{ github.job }}-${{ runner.os }}

      - name: Install system dependencies
        run: |
          if ! sudo apt-get update; then
            sudo rm -f /etc/apt/sources.list.d/azure-cli.list /etc/apt/sources.list.d/microsoft-prod.list
            sudo apt-get update
          fi
          sudo apt-get install -y --no-install-recommends \
            ninja-build \
            gcovr \
            xvfb \
            ffmpeg \
            libwayland-dev \
            wayland-protocols \
            libxkbcommon-dev \
            libx11-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxi-dev \
            libxext-dev \
            libgl1-mesa-dev \
            libglu1-mesa-dev

      - name: Install modern gcovr
        run: python3 -m pip install --user "gcovr>=8.3,<9"

      - name: Cache FetchContent dependencies
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.cmake/fetchcontent
          key: fetchcontent-linux-${{ hashFiles('**/CMakeLists.txt', '**/CMakePresets.json') }}
          restore-keys: fetchcontent-linux-

      - name: Configure
        run: >
          cmake --preset debug
          -DCMAKE_C_COMPILER_LAUNCHER=ccache
          -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
        env:
          FETCHCONTENT_BASE_DIR: ${{ github.workspace }}/.cmake/fetchcontent

      - name: Build
        run: cmake --build --preset debug --parallel

      - name: Test
        run: |
          mkdir -p "${{ github.workspace }}/build/debug/test-results"
          ctest --preset debug --output-on-failure \
            --output-junit "${{ github.workspace }}/build/debug/test-results/results.xml"
        env:
          MONOLITH_LOG_LEVEL: "debug"

      - name: Publish test results
        if: always()
        uses: mikepenz/action-junit-report@v4
        with:
          report_paths: build/debug/test-results/results.xml
          check_name: "Test Results · Linux"
          fail_on_failure: true
          require_tests: true
          detailed_summary: true
          include_passed: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-linux
          path: build/debug/test-results/
          retention-days: 14

      - name: Prepare UI test output directory
        run: mkdir -p ui_test_output

      - name: Build UI Automation Target
        run: cmake --build --preset debug --target HoroEditorUiTest --parallel

      - name: Run UI Automation
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" \
            build/debug/bin/HoroEditorUiTest --run-ui-tests
        env:
          MONOLITH_UI_TEST_CAPTURE: "1"
          MONOLITH_UI_TEST_VIDEO: "1"
          MONOLITH_UI_TEST_RECORDING: "1"
          MONOLITH_UI_TEST_FILTER: "launcher/*"
          MONOLITH_UI_TEST_DELAY_MS: "0"
          MONOLITH_UI_TEST_OUTPUT_DIR: ${{ github.workspace }}/ui_test_output
          MONOLITH_UI_TEST_FFMPEG_PATH: "/usr/bin/ffmpeg"
          MONOLITH_LOG_LEVEL: "debug"
          LIBGL_ALWAYS_SOFTWARE: "1"
          GALLIUM_DRIVER: "llvmpipe"
          MONOLITH_GLFW_SAMPLES: "0"

      - name: Setup tmate session on failure
        if: failure() && github.event_name == 'workflow_dispatch'
        uses: mxschmitt/action-tmate@v3

      - name: Upload UI Test Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-test-results-linux
          path: ui_test_output/
          if-no-files-found: ignore
          retention-days: 30

      - name: Install Build Wrapper
        if: ${{ env.SONAR_TOKEN != '' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}
        uses: SonarSource/sonarqube-scan-action/install-build-wrapper@v7.1.0

      - name: Configure (coverage instrumentation)
        if: ${{ env.SONAR_TOKEN != '' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}
        run: >
          cmake --preset coverage
          -DCMAKE_C_COMPILER_LAUNCHER=ccache
          -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
        env:
          FETCHCONTENT_BASE_DIR: ${{ github.workspace }}/.cmake/fetchcontent

      - name: Build (wrapped + coverage)
        if: ${{ env.SONAR_TOKEN != '' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}
        run: |
          build-wrapper-linux-x86-64 \
            --out-dir bw-output \
            cmake --build --preset coverage --parallel

      - name: Run tests (coverage build)
        if: ${{ env.SONAR_TOKEN != '' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" \
            ctest --preset coverage --output-on-failure
        env:
          MONOLITH_LOG_LEVEL: "debug"
          MONOLITH_GLFW_SAMPLES: "0"
          LIBGL_ALWAYS_SOFTWARE: "1"
          GALLIUM_DRIVER: "llvmpipe"

      - name: Generate Sonar coverage report
        if: ${{ env.SONAR_TOKEN != '' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}
        run: |
          python3 -m gcovr build/coverage \
            --root "${{ github.workspace }}" \
            --sonarqube build/coverage/sonar-coverage.xml \
            --sonarqube-metric line \
            --merge-mode-functions=merge-use-line-min \
            --exclude-directories '.*/_deps($|/.*)' \
            --exclude '.*/vendor/.*' \
            --exclude '.*/_deps/.*' \
            --exclude '.*/tests/.*'

      - name: Generate coverage summary for GitHub output
        if: ${{ env.SONAR_TOKEN != '' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}
        run: |
          # Text table — one row per source file, visible in the Actions step summary
          python3 -m gcovr build/coverage \
            --root "${{ github.workspace }}" \
            --txt build/coverage/summary.txt \
            --txt-metric line \
            --sort uncovered-percent \
            --merge-mode-functions=merge-use-line-min \
            --exclude-directories '.*/_deps($|/.*)' \
            --exclude '.*/vendor/.*' \
            --exclude '.*/_deps/.*' \
            --exclude '.*/tests/.*'

          # Cobertura XML — enables coverage badges and diff overlays on PRs
          python3 -m gcovr build/coverage \
            --root "${{ github.workspace }}" \
            --cobertura build/coverage/cobertura.xml \
            --merge-mode-functions=merge-use-line-min \
            --exclude-directories '.*/_deps($|/.*)' \
            --exclude '.*/vendor/.*' \
            --exclude '.*/_deps/.*' \
            --exclude '.*/tests/.*'

          # Write a formatted summary to the GitHub step summary page
          {
            echo "## 📊 Code Coverage — $(date -u '+%Y-%m-%d %H:%M UTC')"
            echo ""
            echo "| Metric | Value |"
            echo "|--------|-------|"
            total_line=$(grep -E '^TOTAL' build/coverage/summary.txt | tail -1 || true)
            if [ -n "$total_line" ]; then
              lines=$(echo "$total_line" | awk '{print $2}')
              covered=$(echo "$total_line" | awk '{print $3}')
              pct=$(echo "$total_line" | awk '{print $4}')
              echo "| Lines covered | $covered / $lines ($pct) |"
            fi
            echo ""
            echo "<details><summary>Per-file breakdown</summary>"
            echo ""
            echo '```'
            cat build/coverage/summary.txt
            echo '```'
            echo ""
            echo "</details>"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: SonarCloud scan
        if: ${{ env.SONAR_TOKEN != '' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}
        uses: SonarSource/sonarqube-scan-action@v7.1.0
        env:
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: >
            -Dsonar.organization=${{ vars.SONAR_ORGANIZATION }}
            -Dsonar.projectKey=${{ vars.SONAR_PROJECT_KEY }}
            -Dsonar.qualitygate.wait=true

      - name: Upload coverage report
        if: ${{ env.SONAR_TOKEN != '' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-linux
          path: |
            build/coverage/summary.txt
            build/coverage/cobertura.xml
            build/coverage/sonar-coverage.xml
          retention-days: 30

  # ----------------------------------------------------------------
  # Starter integration — final PR gate.
  # Validates this PR commit inside horo-engine-starter on all OS targets.
  # ----------------------------------------------------------------
  starter-integration:
    name: Starter Integration
    if: github.event_name == 'pull_request'
    needs: [ lint, test-linux, test-windows, test-macos ]
    uses: abdullahbodur/horo-engine-starter/.github/workflows/engine-test.yml@main
    with:
      engine_repository: ${{ github.repository }}
      engine_ref: ${{ github.event.pull_request.head.sha }}
    secrets: inherit
