name: CI

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/ISSUE_TEMPLATE/**'
  pull_request:
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/ISSUE_TEMPLATE/**'
  workflow_dispatch:

permissions:
  contents: read
  checks: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test · ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux / GCC
            runner: ubuntu-24.04
            cc: gcc
            cxx: g++
            build_dir: build/ci
          - name: macOS / Clang
            runner: macos-latest
            cc: clang
            cxx: clang++
            build_dir: build/ci
          - name: Windows / MSVC
            runner: windows-2022
            cc: cl
            cxx: cl
            build_dir: build/ci

    steps:
      - uses: actions/checkout@v6

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          if ! sudo apt-get update; then
            sudo rm -f /etc/apt/sources.list.d/azure-cli.list /etc/apt/sources.list.d/microsoft-prod.list
            sudo apt-get update
          fi
          sudo apt-get install -y --no-install-recommends \
            ninja-build \
            libwayland-dev \
            wayland-protocols \
            libxkbcommon-dev \
            libx11-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxi-dev \
            libxext-dev \
            libgl1-mesa-dev \
            libglu1-mesa-dev

      - name: Install macOS system dependencies
        if: runner.os == 'macOS'
        run: brew install ninja

      - name: Setup MSVC environment
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Setup Ninja on Windows
        if: runner.os == 'Windows'
        uses: seanmiddleditch/gha-setup-ninja@v6

      - name: Restore compiler cache
        if: runner.os != 'Windows'
        uses: hendrikmuhs/ccache-action@v1.2.22
        with:
          key: ${{ github.job }}-${{ runner.os }}

      - name: Cache FetchContent dependencies
        uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}/.cmake/fetchcontent
          key: fetchcontent-${{ runner.os }}-${{ hashFiles('**/CMakeLists.txt', 'cmake/**') }}
          restore-keys: fetchcontent-${{ runner.os }}-

      - name: Configure
        shell: bash
        run: |
          cmake -S . -B "${{ matrix.build_dir }}" -G Ninja \
            -DBUILD_TESTING=ON \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_C_COMPILER="${{ matrix.cc }}" \
            -DCMAKE_CXX_COMPILER="${{ matrix.cxx }}" \
            -DCMAKE_C_COMPILER_LAUNCHER="$([[ '${{ runner.os }}' != 'Windows' ]] && echo ccache || true)" \
            -DCMAKE_CXX_COMPILER_LAUNCHER="$([[ '${{ runner.os }}' != 'Windows' ]] && echo ccache || true)"
        env:
          FETCHCONTENT_BASE_DIR: ${{ github.workspace }}/.cmake/fetchcontent

      - name: Build
        run: cmake --build "${{ matrix.build_dir }}" --parallel

      - name: Test
        id: native_tests
        run: |
          cmake -E make_directory "${{ matrix.build_dir }}/test-results"
          ctest --test-dir "${{ matrix.build_dir }}" --output-on-failure --output-junit "${{ matrix.build_dir }}/test-results/ctest.xml"
        env:
          HORO_LOG_LEVEL: debug

      - name: Publish test results
        if: always() && (steps.native_tests.outcome == 'success' || steps.native_tests.outcome == 'failure')
        uses: mikepenz/action-junit-report@v6
        with:
          report_paths: ${{ matrix.build_dir }}/test-results/ctest.xml
          check_name: Test Results · ${{ matrix.name }}
          fail_on_failure: false
          require_tests: false
          detailed_summary: true
          include_passed: false

      - name: Upload test results
        if: always() && (steps.native_tests.outcome == 'success' || steps.native_tests.outcome == 'failure')
        uses: actions/upload-artifact@v7
        with:
          name: test-results-${{ runner.os }}
          path: ${{ github.workspace }}/${{ matrix.build_dir }}/test-results/
          retention-days: 14
