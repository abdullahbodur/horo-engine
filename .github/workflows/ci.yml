name: CI

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/ISSUE_TEMPLATE/**'
  pull_request:
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/ISSUE_TEMPLATE/**'
  workflow_dispatch:

permissions:
  contents: read
  checks: write        # required by mikepenz/action-junit-report to post test result annotations
  pull-requests: write # required to post coverage summaries as PR comments

# Cancel in-progress runs for the same ref when a new push arrives.
# PRs and branches each get their own concurrency group so they don't
# cancel each other.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  #   ----------------------------------------------------------------
  #   Build + Test — macOS (Clang, Ninja)
  #   ----------------------------------------------------------------
  test-macos:
    name: Test · macOS / Clang
    runs-on: macos-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements-dev.txt

      - name: Install Python test dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Restore compiler cache
        uses: hendrikmuhs/ccache-action@v1.2.22
        with:
          key: ${{ github.job }}-${{ runner.os }}

      - name: Cache FetchContent dependencies
        uses: actions/cache@v5
        with:
          path: ~/.cmake/fetchcontent
          key: fetchcontent-macos-${{ hashFiles('**/CMakeLists.txt', '**/CMakePresets.json') }}
          restore-keys: fetchcontent-macos-

      - name: Configure
        run: >
          cmake --preset debug
          -DCMAKE_C_COMPILER_LAUNCHER=ccache
          -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
        env:
          FETCHCONTENT_BASE_DIR: ${{ github.workspace }}/.cmake/fetchcontent

      - name: Build
        run: cmake --build --preset debug

      - name: "Smoke: horopak"
        run: >
          python -m pytest tests/python/ci_smoke/test_horopak.py
          -m ci_smoke
          -v --color=yes
          --horopak-binary build/debug/bin/horopak

      - name: "Smoke: submodule + SDK E2E"
        run: >
          python -m pytest tests/python/ci_smoke/test_submodule_sdk.py
          -m ci_smoke
          -v --color=yes
          --engine-root "${{ github.workspace }}"
          --engine-build-dir "${{ github.workspace }}/build/debug"
          --build-config Debug
          --compiler-launcher ccache
        env:
          FETCHCONTENT_BASE_DIR: ${{ github.workspace }}/.cmake/fetchcontent

      - name: Test
        id: native_tests
        shell: bash
        run: |
          report_dir="${{ github.workspace }}/build/debug/test-results"
          mkdir -p "$report_dir"
          ctest --preset debug \
            --output-on-failure \
            --output-junit "$report_dir/ctest.xml"
        env:
          HORO_LOG_LEVEL: "debug"

      - name: Publish test results
        if: always() && (steps.native_tests.outcome == 'success' || steps.native_tests.outcome == 'failure')
        uses: mikepenz/action-junit-report@v6
        with:
          report_paths: build/debug/test-results/ctest.xml
          check_name: "Test Results · macOS"
          fail_on_failure: false
          require_tests: false
          detailed_summary: true
          include_passed: false

      - name: Upload test results
        if: always() && (steps.native_tests.outcome == 'success' || steps.native_tests.outcome == 'failure')
        uses: actions/upload-artifact@v7
        with:
          name: test-results-macos
          path: build/debug/test-results/
          retention-days: 14

      - name: Setup tmate session
        if: failure() && github.event_name == 'workflow_dispatch'
        uses: mxschmitt/action-tmate@v3

  #   ----------------------------------------------------------------
  #   Build + Test — Windows (MSVC, Ninja)
  #   ----------------------------------------------------------------
  test-windows:
    name: Test · Windows / MSVC
    runs-on: windows-2022
    timeout-minutes: 25
    env:
      SCCACHE_DIR: ${{ github.workspace }}/.sccache
      FETCHCONTENT_BASE_DIR: ${{ github.workspace }}/.cmake/fetchcontent

    steps:
      - uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements-dev.txt

      - name: Install Python test dependencies
        run: python -m pip install -r requirements-dev.txt

      # Puts cl.exe, link.exe, etc. on PATH so Ninja can find MSVC tools.
      - name: Setup MSVC environment
        shell: pwsh
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $installPath = & $vswhere -latest -products * `
            -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 `
            -property installationPath
          if (-not $installPath) {
            throw "Visual Studio with the C++ toolchain was not found."
          }

          $vcvars = Join-Path $installPath "VC\Auxiliary\Build\vcvars64.bat"
          cmd.exe /s /c "`"$vcvars`" && set" | ForEach-Object {
            if ($_ -match '^([^=]+)=(.*)$') {
              "$($matches[1])=$($matches[2])" |
                Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            }
          }

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Cache sccache
        id: cache-sccache
        uses: actions/cache/restore@v5
        with:
          path: ${{ env.SCCACHE_DIR }}
          key: sccache-windows-${{ hashFiles('**/CMakeLists.txt', '**/CMakePresets.json') }}
          restore-keys: sccache-windows-

      - name: Cache FetchContent dependencies
        uses: actions/cache@v5
        with:
          path: ${{ env.FETCHCONTENT_BASE_DIR }}
          key: fetchcontent-windows-${{ hashFiles('**/CMakeLists.txt', '**/CMakePresets.json') }}
          restore-keys: fetchcontent-windows-

      - name: Configure
        run: >
          cmake --preset debug-msvc
          -DCMAKE_C_COMPILER_LAUNCHER=sccache
          -DCMAKE_CXX_COMPILER_LAUNCHER=sccache

      - name: Build
        run: cmake --build --preset debug-msvc

      - name: "Smoke: horopak"
        run: >
          python -m pytest tests/python/ci_smoke/test_horopak.py
          -m ci_smoke
          -v --color=yes
          --horopak-binary build/debug-msvc/bin/horopak.exe
        shell: pwsh

      - name: "Smoke: submodule + SDK E2E"
        run: >
          python -m pytest tests/python/ci_smoke/test_submodule_sdk.py
          -m ci_smoke
          -v --color=yes
          --engine-root "${{ github.workspace }}"
          --engine-build-dir "${{ github.workspace }}/build/debug-msvc"
          --build-config Debug
          --compiler-launcher sccache
        shell: pwsh

      - name: Test
        id: native_tests
        shell: pwsh
        run: |
          $reportDir = "${{ github.workspace }}\build\debug-msvc\test-results"
          New-Item -ItemType Directory -Force -Path $reportDir | Out-Null
          ctest --preset debug-msvc `
            --output-on-failure `
            --output-junit "$reportDir\ctest.xml"
        env:
          HORO_LOG_LEVEL: "debug"

      - name: Publish test results
        if: always() && (steps.native_tests.outcome == 'success' || steps.native_tests.outcome == 'failure')
        uses: mikepenz/action-junit-report@v6
        with:
          report_paths: build/debug-msvc/test-results/ctest.xml
          check_name: "Test Results · Windows"
          fail_on_failure: false
          require_tests: false
          detailed_summary: true
          include_passed: false

      - name: Upload test results
        if: always() && (steps.native_tests.outcome == 'success' || steps.native_tests.outcome == 'failure')
        uses: actions/upload-artifact@v7
        with:
          name: test-results-windows
          path: build/debug-msvc/test-results/
          retention-days: 14

      - name: Setup tmate session
        if: failure() && github.event_name == 'workflow_dispatch'
        uses: mxschmitt/action-tmate@v3

      - name: Show sccache stats
        if: always()
        run: sccache --show-stats

      - name: Save sccache
        if: always() && steps.cache-sccache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: ${{ env.SCCACHE_DIR }}
          key: ${{ steps.cache-sccache.outputs.cache-primary-key }}

  #   ----------------------------------------------------------------
  #   Python Tests
  #   ----------------------------------------------------------------
  python-tests:
    name: Test · Python
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements-dev.txt

      - name: Install Python test dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Run Python script tests
        run: python -m pytest tests/python -m "not ci_smoke" -v --color=yes

  #   ----------------------------------------------------------------
  #   SBOM Validation
  #   ----------------------------------------------------------------
  validate-sbom:
    name: Validate SBOM
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - name: Generate and validate SBOM
        run: |
          set -e
          python3 scripts/generate-sbom.py \
            --output sbom.spdx.json \
            --with-vulkan \
            --with-shader-cooker \
            --validate
          echo ""
          echo "=== SBOM generated successfully ==="
          python3 -c "
          import json
          with open('sbom.spdx.json') as f:
              doc = json.load(f)
          pkgs = doc['packages']
          rels = doc['relationships']
          print(f'  Packages: {len(pkgs)}')
          print(f'  Relationships: {len(rels)}')
          names = {p['name'] for p in pkgs}
          required = {'HoroEngine','glfw','imgui','nlohmann_json','tinygltf','xxhash','lz4','glad','glm','stb','ufbx','bc7enc'}
          missing = required - names
          if missing:
              print(f'ERROR: missing expected packages: {missing}')
              exit(1)
          print('  All required packages present.')
          "

      - name: Verify VERSIONS.json schema
        run: |
          python3 -c "
          import json
          with open('vendor/VERSIONS.json') as f:
              data = json.load(f)
          assert data.get('format_version') == 1, 'format_version must be 1'
          assert isinstance(data.get('entries'), list), 'entries must be a list'
          assert len(data['entries']) >= 5, f'expected >= 5 entries, got {len(data[\"entries\"])}'
          for entry in data['entries']:
              assert 'name' in entry, f'missing name in {entry}'
              assert 'version' in entry, f'missing version in {entry}'
              assert 'license' in entry, f'missing license in {entry}'
          print(f'VERSIONS.json: {len(data[\"entries\"])} entries, schema OK')
          "

  #   ----------------------------------------------------------------
  #   Build + Test — Linux / GCC (+ SonarCloud coverage)
  #   ----------------------------------------------------------------
  test-linux:
    name: Test · Linux / GCC
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      BUILD_WRAPPER_OUT_DIR: bw-output
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements-dev.txt

      - name: Install Python test dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Restore compiler cache
        uses: hendrikmuhs/ccache-action@v1.2.22
        with:
          key: ${{ github.job }}-${{ runner.os }}

      - name: Install system dependencies
        run: |
          if ! sudo apt-get update; then
            sudo rm -f /etc/apt/sources.list.d/azure-cli.list /etc/apt/sources.list.d/microsoft-prod.list
            sudo apt-get update
          fi
          sudo apt-get install -y --no-install-recommends \
            ninja-build \
            gcovr \
            libwayland-dev \
            wayland-protocols \
            libxkbcommon-dev \
            libx11-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxi-dev \
            libxext-dev \
            libgl1-mesa-dev \
            libglu1-mesa-dev

      - name: Install modern gcovr
        run: python3 -m pip install --user "gcovr>=8.3,<9"

      - name: Cache FetchContent dependencies
        uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}/.cmake/fetchcontent
          key: fetchcontent-linux-${{ hashFiles('**/CMakeLists.txt', '**/CMakePresets.json') }}
          restore-keys: fetchcontent-linux-

      - name: Configure
        run: >
          cmake --preset debug
          -DCMAKE_C_COMPILER_LAUNCHER=ccache
          -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
        env:
          FETCHCONTENT_BASE_DIR: ${{ github.workspace }}/.cmake/fetchcontent

      - name: Build
        run: cmake --build --preset debug

      - name: "Smoke: horopak"
        run: >
          python -m pytest tests/python/ci_smoke/test_horopak.py
          -m ci_smoke
          -v --color=yes
          --horopak-binary build/debug/bin/horopak

      - name: "Smoke: submodule + SDK E2E"
        run: >
          python -m pytest tests/python/ci_smoke/test_submodule_sdk.py
          -m ci_smoke
          -v --color=yes
          --engine-root "${{ github.workspace }}"
          --engine-build-dir "${{ github.workspace }}/build/debug"
          --build-config Debug
          --compiler-launcher ccache
        env:
          FETCHCONTENT_BASE_DIR: ${{ github.workspace }}/.cmake/fetchcontent

      - name: Test
        id: native_tests
        shell: bash
        run: |
          report_dir="${{ github.workspace }}/build/debug/test-results"
          mkdir -p "$report_dir"
          ctest --preset debug \
            --output-on-failure \
            --output-junit "$report_dir/ctest.xml"
        env:
          HORO_LOG_LEVEL: "debug"

      - name: Publish test results
        if: always() && (steps.native_tests.outcome == 'success' || steps.native_tests.outcome == 'failure')
        uses: mikepenz/action-junit-report@v6
        with:
          report_paths: build/debug/test-results/ctest.xml
          check_name: "Test Results · Linux"
          fail_on_failure: false
          require_tests: false
          detailed_summary: true
          include_passed: false

      - name: Upload test results
        if: always() && (steps.native_tests.outcome == 'success' || steps.native_tests.outcome == 'failure')
        uses: actions/upload-artifact@v7
        with:
          name: test-results-linux
          path: build/debug/test-results/
          retention-days: 14

      - name: Setup tmate session on failure
        if: failure() && github.event_name == 'workflow_dispatch'
        uses: mxschmitt/action-tmate@v3

      - name: Install Build Wrapper
        if: ${{ env.SONAR_TOKEN != '' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}
        uses: SonarSource/sonarqube-scan-action/install-build-wrapper@v7.1.0

      - name: Configure (coverage instrumentation)
        if: ${{ env.SONAR_TOKEN != '' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}
        run: >
          cmake --preset coverage
          -DCMAKE_C_COMPILER_LAUNCHER=ccache
          -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
        env:
          FETCHCONTENT_BASE_DIR: ${{ github.workspace }}/.cmake/fetchcontent

      - name: Build (wrapped + coverage)
        if: ${{ env.SONAR_TOKEN != '' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}
        run: |
          build-wrapper-linux-x86-64 \
            --out-dir ${{ env.BUILD_WRAPPER_OUT_DIR }} \
            cmake --build --preset coverage

      - name: Run tests (coverage build)
        if: ${{ env.SONAR_TOKEN != '' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" \
            ctest --preset coverage --output-on-failure
        env:
          HORO_LOG_LEVEL: "debug"
          HORO_GLFW_SAMPLES: "0"
          LIBGL_ALWAYS_SOFTWARE: "1"
          GALLIUM_DRIVER: "llvmpipe"

      - name: Generate Sonar coverage report
        if: ${{ env.SONAR_TOKEN != '' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}
        run: |
          set -f
          python3 -m gcovr build/coverage \
            --root "${{ github.workspace }}" \
            --sonarqube build/coverage/sonar-coverage.xml \
            --sonarqube-metric line \
            --merge-mode-functions=merge-use-line-min \
            --gcov-ignore-parse-errors=negative_hits.warn_once_per_file \
            --exclude-directories '.*/_deps($|/.*)' \
            $(python3 "${{ github.workspace }}/scripts/ci.py" coverage-exclusions gcovr "${{ github.workspace }}")

      - name: SonarCloud scan
        if: ${{ env.SONAR_TOKEN != '' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}
        uses: SonarSource/sonarqube-scan-action@v7.1.0
        env:
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: >
            -Dsonar.organization=${{ vars.SONAR_ORGANIZATION }}
            -Dsonar.projectKey=${{ vars.SONAR_PROJECT_KEY }}
            -Dsonar.coverageReportPaths=build/coverage/sonar-coverage.xml
            -Dsonar.cfamily.compile-commands=${{ env.BUILD_WRAPPER_OUT_DIR }}/compile_commands.json
