  test-windows:
    name: Test · Windows / MSVC
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Windows runner diagnostics
        shell: pwsh
        run: |
          Write-Host "=== CPU ==="
          Get-CimInstance Win32_Processor |
            Select-Object Name, NumberOfCores, NumberOfLogicalProcessors, MaxClockSpeed |
            Format-List

          Write-Host "=== Memory ==="
          Get-CimInstance Win32_OperatingSystem |
            Select-Object TotalVisibleMemorySize, FreePhysicalMemory |
            Format-List

          Write-Host "=== Disk speed smoke test (256MB) ==="
          $diagFile = Join-Path "${{ github.workspace }}" "ui_test_output_speed_probe.bin"
          $sw = [System.Diagnostics.Stopwatch]::StartNew()
          $bytes = New-Object byte[] (256MB)
          [System.IO.File]::WriteAllBytes($diagFile, $bytes)
          $sw.Stop()
          Write-Host ("Write 256MB: {0:N2}s" -f $sw.Elapsed.TotalSeconds)

          $sw.Restart()
          [void][System.IO.File]::ReadAllBytes($diagFile)
          $sw.Stop()
          Write-Host ("Read 256MB:  {0:N2}s" -f $sw.Elapsed.TotalSeconds)
          Remove-Item -LiteralPath $diagFile -Force -ErrorAction SilentlyContinue

      - name: Setup FFmpeg
        uses: FedericoCarboni/setup-ffmpeg@v3
        id: setup-ffmpeg
        with:
          ffmpeg-version: release

      - name: Cache FetchContent dependencies
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.cmake/fetchcontent
          key: fetchcontent-windows-${{ hashFiles('**/CMakeLists.txt', '**/CMakePresets.json') }}
          restore-keys: fetchcontent-windows-

      - name: Configure
        run: cmake --preset debug-msvc
        env:
          FETCHCONTENT_BASE_DIR: ${{ github.workspace }}/.cmake/fetchcontent

      - name: Build
        run: cmake --build build/debug-msvc --config Debug --parallel

      - name: Test
        run: ctest --test-dir build/debug-msvc -C Debug --output-on-failure

      - name: Prepare UI test output directory
        shell: pwsh
        run: New-Item -ItemType Directory -Force ui_test_output | Out-Null

      - name: Build UI Automation Target
        run: cmake --build build/debug-msvc --config Debug --target HoroEditorUiTest --parallel

      - name: Run UI Automation Smoke (no recording)
        shell: pwsh
        timeout-minutes: 12
        run: |
          $env:MONOLITH_UI_TEST_CAPTURE = "0"
          $env:MONOLITH_UI_TEST_VIDEO = "0"
          $env:MONOLITH_UI_TEST_RECORDING = "0"
          $env:MONOLITH_UI_TEST_FILTER = "launcher/*"
          $env:MONOLITH_UI_TEST_DELAY_MS = "0"
          $env:MONOLITH_UI_TEST_OUTPUT_DIR = "${{ github.workspace }}/ui_test_output"
          $env:MONOLITH_GLFW_SAMPLES = "0"
          $env:MONOLITH_UI_TEST_CLEAN_TEMP = "0"
          $uiExe = ".\build\debug-msvc\bin\Debug\HoroEditorUiTest.exe"
          if (-not (Test-Path -LiteralPath $uiExe -PathType Leaf)) {
            Write-Error "UI automation executable not found: $uiExe"
            exit 1
          }
          Write-Host "Using UI automation executable: $uiExe"
          Write-Host "Starting Windows UI automation smoke run (recording disabled)."
          & $uiExe --run-ui-tests
          $uiExit = $LASTEXITCODE
          if ($uiExit -ne 0) {
            Write-Error "Smoke run failed with exit code $uiExit."
            exit $uiExit
          }

      - name: Run UI Automation Recording (capture + video)
        shell: pwsh
        timeout-minutes: 12
        run: |
          $env:MONOLITH_UI_TEST_CAPTURE = "1"
          $env:MONOLITH_UI_TEST_VIDEO = "1"
          $env:MONOLITH_UI_TEST_RECORDING = "1"
          $env:MONOLITH_UI_TEST_FILTER = "launcher/*"
          $env:MONOLITH_UI_TEST_DELAY_MS = "0"
          $env:MONOLITH_UI_TEST_OUTPUT_DIR = "${{ github.workspace }}/ui_test_output"
          $ffmpegPath = "${{ steps.setup-ffmpeg.outputs.ffmpeg-path }}"
          if (-not $ffmpegPath) {
            Write-Error "Unable to locate FFmpeg path from setup-ffmpeg output."
            exit 1
          }
          if (Test-Path -LiteralPath $ffmpegPath -PathType Container) {
            $ffmpegPath = Join-Path $ffmpegPath "ffmpeg.exe"
          }
          if (-not (Test-Path -LiteralPath $ffmpegPath -PathType Leaf)) {
            Write-Error "Resolved FFmpeg executable not found: $ffmpegPath"
            exit 1
          }
          Write-Host "Using FFmpeg executable: $ffmpegPath"
          $env:MONOLITH_UI_TEST_FFMPEG_PATH = $ffmpegPath
          $env:MONOLITH_GLFW_SAMPLES = "0"
          $env:MONOLITH_UI_TEST_CLEAN_TEMP = "0"
          $uiExe = ".\build\debug-msvc\bin\Debug\HoroEditorUiTest.exe"
          if (-not (Test-Path -LiteralPath $uiExe -PathType Leaf)) {
            Write-Error "UI automation executable not found: $uiExe"
            exit 1
          }
          Write-Host "Using UI automation executable: $uiExe"
          Write-Host "Starting Windows UI automation recording run."
          & $uiExe --run-ui-tests
          $uiExit = $LASTEXITCODE
          $videos = Get-ChildItem -Path ui_test_output -Filter *.mp4 -Recurse -ErrorAction SilentlyContinue
          if ($uiExit -ne 0) {
            if ($videos) {
              Write-Warning "HoroEditorUiTest exited with code $uiExit on Windows, but video artifacts exist. Continuing."
            } else {
              Write-Error "Recording run failed with exit code $uiExit and no video artifacts were produced."
              exit $uiExit
            }
          }

      - name: Verify UI video output
        shell: pwsh
        run: |
          $videos = Get-ChildItem -Path ui_test_output -Filter *.mp4 -Recurse -ErrorAction SilentlyContinue
          if (-not $videos) {
            Write-Error "Expected at least one MP4 artifact in ui_test_output, but none were produced."
            exit 1
          }
          Write-Host "Found UI video artifacts:"
          $videos | ForEach-Object { Write-Host $_.FullName }

      - name: Dump Windows UI automation diagnostics on failure
        if: failure()
        shell: pwsh
        run: |
          Write-Host "=== UI automation env ==="
          Get-ChildItem Env: | Where-Object {
            $_.Name -like "MONOLITH_UI_TEST*"
          } | Sort-Object Name | ForEach-Object { Write-Host "$($_.Name)=$($_.Value)" }
          Write-Host "=== ui_test_output files ==="
          Get-ChildItem -Path ui_test_output -Recurse -ErrorAction SilentlyContinue | ForEach-Object { Write-Host $_.FullName }
          $stdoutLog = "ui_test_output\horo_ui_test_windows.stdout.log"
          $stderrLog = "ui_test_output\horo_ui_test_windows.stderr.log"
          if (Test-Path -LiteralPath $stdoutLog) {
            Write-Host "=== tail $stdoutLog ==="
            Get-Content -Path $stdoutLog -Tail 200
          }
          if (Test-Path -LiteralPath $stderrLog) {
            Write-Host "=== tail $stderrLog ==="
            Get-Content -Path $stderrLog -Tail 200
          }

      - name: Upload UI Test Artifacts
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: ui-test-results-windows
          path: ui_test_output/
          if-no-files-found: ignore
          retention-days: 30

