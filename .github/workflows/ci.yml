name: CI

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/ISSUE_TEMPLATE/**'
  pull_request:
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/ISSUE_TEMPLATE/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test · ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 25
    permissions:
      contents: read
      checks: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux / GCC
            runner: ubuntu-24.04
            cc: gcc
            cxx: g++
            build_dir: build/ci
          - name: macOS / Clang
            runner: macos-latest
            cc: clang
            cxx: clang++
            build_dir: build/ci
          - name: Windows / MSVC
            runner: windows-2022
            cc: cl
            cxx: cl
            build_dir: build/ci

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          if ! sudo apt-get update; then
            sudo rm -f /etc/apt/sources.list.d/azure-cli.list /etc/apt/sources.list.d/microsoft-prod.list
            sudo apt-get update
          fi
          sudo apt-get install -y --no-install-recommends \
            ninja-build \
            libwayland-dev \
            wayland-protocols \
            libxkbcommon-dev \
            libx11-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxi-dev \
            libxext-dev \
            libgl1-mesa-dev \
            libglu1-mesa-dev

      - name: Install macOS system dependencies
        if: runner.os == 'macOS'
        run: brew install ninja

      - name: Setup MSVC environment
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756

      - name: Setup Ninja on Windows
        if: runner.os == 'Windows'
        uses: seanmiddleditch/gha-setup-ninja@3b1f8f94a2f8254bd26914c4ab9474d4f0015f67

      - name: Restore compiler cache
        if: runner.os != 'Windows'
        uses: hendrikmuhs/ccache-action@33522472633dbd32578e909b315f5ee43ba878ce
        with:
          key: ${{ github.job }}-${{ runner.os }}

      - name: Cache FetchContent dependencies
        uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25
        with:
          path: ${{ github.workspace }}/.cmake/fetchcontent
          key: fetchcontent-${{ runner.os }}-${{ hashFiles('**/CMakeLists.txt', 'cmake/**') }}
          restore-keys: fetchcontent-${{ runner.os }}-

      - name: Configure
        shell: bash
        run: |
          cmake -S . -B "${{ matrix.build_dir }}" -G Ninja \
            -DBUILD_TESTING=ON \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_C_COMPILER="${{ matrix.cc }}" \
            -DCMAKE_CXX_COMPILER="${{ matrix.cxx }}" \
            -DCMAKE_C_COMPILER_LAUNCHER="$([[ '${{ runner.os }}' != 'Windows' ]] && echo ccache || true)" \
            -DCMAKE_CXX_COMPILER_LAUNCHER="$([[ '${{ runner.os }}' != 'Windows' ]] && echo ccache || true)"
        env:
          FETCHCONTENT_BASE_DIR: ${{ github.workspace }}/.cmake/fetchcontent

      - name: Build
        run: cmake --build "${{ matrix.build_dir }}" --parallel

      - name: Test
        id: native_tests
        shell: bash
        run: |
          RESULTS_DIR="${{ github.workspace }}/${{ matrix.build_dir }}/test-results"
          cmake -E make_directory "$RESULTS_DIR"
          ctest --test-dir "${{ matrix.build_dir }}" \
            --output-on-failure \
            --output-junit "$RESULTS_DIR/ctest.xml"
          echo "=== test-results directory ==="
          ls -la "$RESULTS_DIR" || true
        env:
          HORO_LOG_LEVEL: debug

      - name: Publish test results
        if: always() && (steps.native_tests.outcome == 'success' || steps.native_tests.outcome == 'failure')
        uses: mikepenz/action-junit-report@d9f48fc87bc235f7e214acf696ca5abc0a986f16
        with:
          report_paths: ${{ github.workspace }}/${{ matrix.build_dir }}/test-results/ctest.xml
          check_name: Test Results · ${{ matrix.name }}
          fail_on_failure: false
          require_tests: false
          detailed_summary: true
          include_passed: false

      - name: Upload test results
        if: always() && (steps.native_tests.outcome == 'success' || steps.native_tests.outcome == 'failure')
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: test-results-${{ runner.os }}
          path: ${{ github.workspace }}/${{ matrix.build_dir }}/test-results/
          retention-days: 14

  sonar:
    name: SonarCloud
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    needs: test
    permissions:
      contents: read
      checks: write
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      BUILD_WRAPPER_OUT_DIR: bw-output
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: 0

      - name: Install Linux system dependencies
        run: |
          if ! sudo apt-get update; then
            sudo rm -f /etc/apt/sources.list.d/azure-cli.list /etc/apt/sources.list.d/microsoft-prod.list
            sudo apt-get update
          fi
          sudo apt-get install -y --no-install-recommends \
            ninja-build \
            libwayland-dev \
            wayland-protocols \
            libxkbcommon-dev \
            libx11-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxi-dev \
            libxext-dev \
            libgl1-mesa-dev \
            libglu1-mesa-dev

      - name: Restore compiler cache
        uses: hendrikmuhs/ccache-action@33522472633dbd32578e909b315f5ee43ba878ce
        with:
          key: sonar-${{ runner.os }}

      - name: Cache FetchContent dependencies
        uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25
        with:
          path: ${{ github.workspace }}/.cmake/fetchcontent
          key: fetchcontent-sonar-${{ hashFiles('**/CMakeLists.txt', 'cmake/**') }}
          restore-keys: fetchcontent-sonar-

      - name: Install Build Wrapper
        run: |
          curl -sSL --proto-redir =https -o /tmp/bw.zip https://sonarcloud.io/static/cpp/build-wrapper-linux-x86.zip
          unzip -qo /tmp/bw.zip -d /tmp/bw
          chmod +x /tmp/bw/build-wrapper-linux-x86/build-wrapper-linux-x86-64
          echo "/tmp/bw/build-wrapper-linux-x86" >> $GITHUB_PATH

      - name: Configure
        run: |
          cmake -S . -B build/sonar -G Ninja \
            -DBUILD_TESTING=ON \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_C_COMPILER=gcc \
            -DCMAKE_CXX_COMPILER=g++ \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
        env:
          FETCHCONTENT_BASE_DIR: ${{ github.workspace }}/.cmake/fetchcontent

      - name: Build (wrapped)
        run: |
          build-wrapper-linux-x86-64 \
            --out-dir ${{ env.BUILD_WRAPPER_OUT_DIR }} \
            cmake --build build/sonar --parallel

      - name: SonarCloud scan
        uses: SonarSource/sonarqube-scan-action@299e4b793aaa83bf2aba7c9c14bedbb485688ec4
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.organization=docktail
            -Dsonar.projectKey=abdullahbodur_horo-engine
            -Dsonar.cfamily.compile-commands=${{ env.BUILD_WRAPPER_OUT_DIR }}/compile_commands.json
