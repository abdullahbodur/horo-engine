sonar.projectKey=abdullahbodur_horo-engine
sonar.organization=docktail
sonar.sourceEncoding=UTF-8

# Keep the repository-level scanner pointed at the active tree only.
# deprecated/ is a ghost zone used only as migration reference for old source;
# Sonar must not index, analyze, or compute coverage for anything under it.
sonar.sources=.
sonar.exclusions=deprecated/**,build/**,cmake-build-debug/**,venv/**,.git/**,.hermes/**,.idea/**,.vscode/**,.cursor/**,.openclaw/**,.pytest_cache/**,bw-output/**
sonar.coverage.exclusions=deprecated/**,tests/**,build/**,cmake-build-debug/**,vendor/**
sonar.cpd.exclusions=deprecated/**,vendor/**
sonar.test.exclusions=deprecated/**

# Active tests will be wired here as they are migrated out of deprecated/.
sonar.tests=tests
sonar.test.inclusions=tests/**
